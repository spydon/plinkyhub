name: plinkyhub
description: "PlinkyHub - Create, share and organize your Plinky synth presets"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^3.3.1
  flutter_soloud: ^3.5.4
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  json_annotation: ^4.11.0
  supabase_flutter: ^2.12.2
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.13.1
  flame_lint: ^1.4.3
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
