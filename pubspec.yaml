name: plinkyhub
description: "PlinkyHub - Create, share and organize your plinky patches"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  google_fonts: ^8.0.2
  json_annotation: ^4.11.0
  supabase_flutter: ^2.10.2
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.13.1
  flame_lint: ^1.4.3
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
